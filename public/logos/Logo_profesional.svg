<svg width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">

<style>
.textMain{
    font-family: 'Segoe UI', sans-serif;
    font-weight:700;
    letter-spacing:4px;
}
.gold{
    fill:#d4a24c;
}
.dark{
    fill:#111;
}
.strokeGold{
    stroke:#d4a24c;
    stroke-width:4;
    fill:none;
}
</style>

<!-- MC Monogram -->
<text x="70" y="110" font-size="90" class="textMain dark">M</text>
<text x="140" y="110" font-size="90" class="textMain gold">C</text>

<!-- Basketball lines inside C -->
<path d="M175 65 A35 35 0 0 1 175 135" class="strokeGold"></path>
<path d="M150 90 L200 90" class="strokeGold"></path>
<path d="M150 110 L200 110" class="strokeGold"></path>

<!-- Music note -->
<circle cx="120" cy="50" r="6" class="gold"></circle>
<rect x="125" y="20" width="3" height="30" class="gold"></rect>

<!-- Name -->
<text x="70" y="170" font-size="28" class="textMain dark">
MANUEL CORDOBA
</text>

</svg>
